{% extends "base.html" %}
{% block content %}
<h2>{% if contract %}编辑合同{% else %}新建合同{% endif %}</h2>
<form method="POST" enctype="multipart/form-data">
    <div class="form-row">
        <div class="form-group">
            <label>客户名称*</label>
            <input type="text" name="customer_name" value="{{ contract.customer_name if contract else '' }}" required>
        </div>
        <div class="form-group">
            <label>项目名称*</label>
            <input type="text" name="project_name" value="{{ contract.project_name if contract else '' }}" required>
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>型号</label>
            <input type="text" name="model" value="{{ contract.model if contract else '' }}">
        </div>
        <div class="form-group">
            <label>单位</label>
            <input type="text" name="unit" value="{{ contract.unit if contract else '' }}">
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>数量</label>
            <input type="number" step="0.01" name="quantity" value="{{ contract.quantity if contract else '' }}">
        </div>
        <div class="form-group">
            <label>单价</label>
            <input type="number" step="0.01" name="unit_price" value="{{ contract.unit_price if contract else '' }}">
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>合同总价*</label>
            <input type="number" step="0.01" name="total_price" value="{{ contract.total_price if contract else '' }}" required>
        </div>
        <div class="form-group">
            <label>发票税率(%)</label>
            <input type="number" step="0.01" name="tax_rate" value="{{ contract.tax_rate if contract else '' }}">
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>合同类型</label>
            <select name="contract_type">
                <option value="">请选择</option>
                <option value="工程" {% if contract and contract.contract_type == '工程' %}selected{% endif %}>工程</option>
                <option value="货物" {% if contract and contract.contract_type == '货物' %}selected{% endif %}>货物</option>
                <option value="服务" {% if contract and contract.contract_type == '服务' %}selected{% endif %}>服务</option>
            </select>
        </div>
        <div class="form-group">
            <label>具体子类</label>
            <input type="text" name="sub_type" value="{{ contract.sub_type if contract else '' }}" placeholder="如：硬件销售、软件采购">
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>项目人员</label>
            <input type="text" name="project_staff" value="{{ contract.project_staff if contract else '' }}" placeholder="多人用逗号分隔">
        </div>
        <div class="form-group">
            <label>销售人员</label>
            <input type="text" name="sales_staff" value="{{ contract.sales_staff if contract else '' }}">
        </div>
    </div>
    {% if contract %}
    <div class="form-group">
        <label>状态</label>
        <select name="status">
            <option value="进行中" {% if contract.status == '进行中' %}selected{% endif %}>进行中</option>
            <option value="已完结" {% if contract.status == '已完结' %}selected{% endif %}>已完结</option>
        </select>
    </div>
    {% endif %}
    <div class="form-group">
        <label>合同文件(PDF/扫描件)</label>
        <input type="file" name="contract_file" accept=".pdf,.jpg,.jpeg,.png">
        {% if contract and contract.file_path %}
        <small>当前文件: <a href="{{ url_for('download_file', filename=contract.file_path) }}">{{ contract.file_path }}</a></small>
        {% endif %}
    </div>
    <button type="submit" class="btn btn-success">保存</button>
    <a href="{{ url_for('index') }}" class="btn btn-secondary">取消</a>
</form>
{% endblock %}
