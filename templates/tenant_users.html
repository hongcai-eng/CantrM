{% extends "base.html" %}
{% block content %}
<h2>租户「{{ tenant.name }}」用户列表</h2>
<a href="{{ url_for('tenant_management') }}" class="btn btn-secondary" style="margin-bottom:20px;">返回租户管理</a>
<table>
    <thead>
        <tr>
            <th>账号</th>
            <th>角色</th>
            <th>权限</th>
            <th>操作</th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user.username }}</td>
            <td>{{ user.role }}</td>
            <td>{{ user.permissions }}</td>
            <td>
                <button onclick="showResetPwd({{ user.id }}, '{{ user.username }}')" class="btn btn-primary">修改密码</button>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<!-- 修改密码弹窗 -->
<div id="resetPwdModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;">
    <div style="background:white;width:400px;margin:150px auto;padding:30px;border-radius:8px;">
        <h3>修改密码 - <span id="resetUsername"></span></h3>
        <form method="POST" id="resetPwdForm">
            <div class="form-group">
                <label>新密码*</label>
                <input type="password" name="password" required placeholder="至少6位">
            </div>
            <button type="submit" class="btn btn-success">保存</button>
            <button type="button" onclick="document.getElementById('resetPwdModal').style.display='none'" class="btn btn-secondary">取消</button>
        </form>
    </div>
</div>
<script>
function showResetPwd(userId, username) {
    document.getElementById('resetUsername').textContent = username;
    document.getElementById('resetPwdForm').action = '/user/' + userId + '/reset_password';
    document.getElementById('resetPwdModal').style.display = 'block';
}
</script>
{% endblock %}
