{% extends "base.html" %}
{% block content %}
<h2>客户管理</h2>
<button onclick="document.getElementById('addForm').style.display='block'" class="btn btn-primary">添加客户</button>

<div style="background: #f8f9fa; padding: 15px; border-radius: 4px; margin: 20px 0;">
    <form method="GET" action="{{ url_for('customers') }}">
        <div class="form-row">
            <div class="form-group">
                <label>客户名称</label>
                <input type="text" name="name" value="{{ request.args.get('name', '') }}">
            </div>
            <div class="form-group">
                <label>省份</label>
                <input type="text" name="province" value="{{ request.args.get('province', '') }}">
            </div>
        </div>
        <button type="submit" class="btn btn-primary">筛选</button>
        <a href="{{ url_for('customers') }}" class="btn btn-secondary">清除</a>
    </form>
</div>

<div id="addForm" style="display:none; margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 4px;">
    <h3>添加客户</h3>
    <form method="POST" action="{{ url_for('new_customer') }}">
        <div class="form-row">
            <div class="form-group">
                <label>客户名称</label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>省份</label>
                <input type="text" name="province">
            </div>
        </div>
        <div class="form-group">
            <label>区域</label>
            <input type="text" name="region">
        </div>
        <div class="form-group">
            <label>统一信用代码</label>
            <input type="text" name="credit_code">
        </div>
        <button type="submit" class="btn btn-success">保存</button>
        <button type="button" onclick="document.getElementById('addForm').style.display='none'" class="btn btn-secondary">取消</button>
    </form>
</div>

<table>
    <thead>
        <tr>
            <th>客户名称</th>
            <th>省份</th>
            <th>区域</th>
            <th>统一信用代码</th>
            <th>操作</th>
        </tr>
    </thead>
    <tbody>
        {% for customer in customers %}
        <tr>
            <td>{{ customer.name }}</td>
            <td>{{ customer.province }}</td>
            <td>{{ customer.region }}</td>
            <td>{{ customer.credit_code }}</td>
            <td>
                <button onclick="editCustomer({{ customer.id }}, '{{ customer.name }}', '{{ customer.province }}', '{{ customer.region }}', '{{ customer.credit_code }}')" class="btn btn-secondary">编辑</button>
                <form method="POST" action="{{ url_for('delete_customer', id=customer.id) }}" style="display:inline;">
                    <button type="submit" class="btn btn-danger" onclick="return confirm('确定删除？')">删除</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<div id="editForm" style="display:none; margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 4px;">
    <h3>编辑客户</h3>
    <form method="POST" id="editFormAction">
        <input type="hidden" id="editId">
        <div class="form-row">
            <div class="form-group">
                <label>客户名称</label>
                <input type="text" name="name" id="editName" required>
            </div>
            <div class="form-group">
                <label>省份</label>
                <input type="text" name="province" id="editProvince">
            </div>
        </div>
        <div class="form-group">
            <label>区域</label>
            <input type="text" name="region" id="editRegion">
        </div>
        <div class="form-group">
            <label>统一信用代码</label>
            <input type="text" name="credit_code" id="editCreditCode">
        </div>
        <button type="submit" class="btn btn-success">保存</button>
        <button type="button" onclick="document.getElementById('editForm').style.display='none'" class="btn btn-secondary">取消</button>
    </form>
</div>

<script>
function editCustomer(id, name, province, region, credit_code) {
    document.getElementById('editForm').style.display = 'block';
    document.getElementById('editFormAction').action = '/customer/' + id + '/edit';
    document.getElementById('editName').value = name;
    document.getElementById('editProvince').value = province || '';
    document.getElementById('editRegion').value = region || '';
    document.getElementById('editCreditCode').value = credit_code || '';
}
</script>
{% endblock %}
